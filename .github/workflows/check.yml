name: Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cloud-function:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudfunctions/lostfound
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: npm
          cache-dependency-path: cloudfunctions/lostfound/package-lock.json
      - run: npm ci
      - run: npm run check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check

  qq-ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qq-ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: qq-ingestion/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall -q .
      - run: python -m unittest discover -s test -v
